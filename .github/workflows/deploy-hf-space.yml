# Mirrors this repo to a Hugging Face Docker Space on every push to main, so the
# Space rebuilds from the latest commit. See docs/DEPLOY_HF_SPACES.md.
#
# One-time setup in GitHub repo settings:
#   Secrets  → HF_TOKEN     : a Hugging Face token with *write* access
#   Variables → HF_SPACE_ID : "<your-hf-username>/<space-name>"
name: Deploy to HF Spaces

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Serialize deploys; cancel an in-flight one if a newer commit lands.
concurrency:
  group: hf-space-deploy
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check configuration
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          if [ -z "$HF_TOKEN" ] || [ -z "$HF_SPACE_ID" ]; then
            echo "::error::Set the HF_TOKEN secret and HF_SPACE_ID variable (see docs/DEPLOY_HF_SPACES.md)."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # full history so the Space push isn't a shallow reject

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_ID: ${{ vars.HF_SPACE_ID }}
        run: |
          git push --force \
            "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE_ID}" \
            HEAD:main
